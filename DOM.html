<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Student Management System</title>
<link rel="stylesheet" href="style.css">
</head>

<body>

<h1>Student Management System</h1>

<form id="student-form">

<label>Student Name:</label>
<input type="text" id="student-name" placeholder="Enter name">

<label>Roll No:</label>
<input type="text" id="student-roll" placeholder="Enter roll">

<button type="submit" id="add-btn" disabled>Add</button>

</form>

<br>

<input type="text" id="search" placeholder="Search student">

<h2>Student List</h2>

<ul id="student-list" class="student-list"></ul>

<p id="total">Total students: 0</p>

<p id="attendance">Present: 0 , Absent: 0</p>

<button id="sort-btn">Sort A-Z</button>

<button id="highlight-btn">Highlight First Student</button>

<h1>    

    
</h1>

<p>© 2026 Student Management System | Developed by Asma Akther (23-53029-3@student.aiub.edu)</p>
</footer>

<script src="style.js"></script>

</body>
</html>
