<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="description" content="Structured HTML form with proper input types, grouping elements and accessibility">
    <title>Student Registration Form</title>
</head>
<body>

    <h1>Student Registration</h1>

    <!-- ================= Form Start ================= -->
    <form action="#" method="post">

        <!-- ========== Personal Information Group ========== -->
        <fieldset>
            <legend>Personal Information</legend>

            <!-- Full Name -->
            <label for="fullname">Full Name:</label>
            <input type="text" id="fullname" name="fullname" required>
            <br><br>

            <!-- Email Address-->
            <label for="email">Email Address:</label>
            <input type="email" id="email" name="email" required>
            <br><br>

            <!-- Password -->
            <label for="password">Password:</label>
            <input type="password" id="password" name="password" required>
            <br><br>

            <!-- Date of Birth -->
            <label for="dob">Date of Birth:</label>
            <input type="date" id="dob" name="dob">
            <br><br>

            <!-- Gender -->
            <span>Gender:</span><br>

            <input type="radio" id="male" name="gender" value="Male">
            <label for="male">Male</label>

            <input type="radio" id="female" name="gender" value="Female">
            <label for="female">Female</label>

            <input type="radio" id="other" name="gender" value="Other">
            <label for="other">Other</label>

            <br><br>
        </fieldset>

        <br>

        <!-- ========== Academic Information Group ========== -->
        <fieldset>
            <legend>Academic Information</legend>

            <!-- Department -->
            <label for="department">Department:</label>
            <select id="department" name="department">
                <option value="">-- Select Department --</option>
                <option value="CSE">Computer Science And Engineering</option>
                <option value="IT">Information Technology</option>
                <option value="ME">Mechanical Engineering</option>
                <option value="EEE">Electrical And Electronics Engineering</option>
                <option value="CE">Civil Engineering</option>
                <option value="PHARM">Pharmacy</option>
                <option value="BBA">Business Administration</option>
            </select>
            <br><br>

            <!-- Skills -->
            <span>Skills:</span><br>

            <input type="checkbox" id="html" name="skills" value="HTML">
            <label for="html">HTML</label>

            <input type="checkbox" id="css" name="skills" value="CSS">
            <label for="css">CSS</label>

            <input type="checkbox" id="js" name="skills" value="JavaScript">
            <label for="js">JavaScript</label>

            <input type="checkbox" id="python" name="skills" value="Python">
            <label for="python">Python</label>

            <input type="checkbox" id="c++" name="skills" value="C++">
            <label for="c++">C++</label>

            <input type="checkbox" id="sql" name="skills" value="SQL">
            <label for="sql">SQL</label>

            <input type="checkbox" id="c#" name="skills" value="C#">
            <label for="c#">C#</label>

        </fieldset>

        <br>

        <!-- ========== Form Buttons ========== -->
        <input type="submit" value="Submit">
        <input type="reset" value="Reset">

    </form>
    <!-- ================= Form End ================= -->

</body>
</html>
